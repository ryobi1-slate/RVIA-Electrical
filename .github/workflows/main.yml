name: Slate Repo Rescue & Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  rescue-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'

      - name: Execute Safe Organization
        run: |
          python -c "
          import os, shutil
          from pathlib import Path

          # 1. Ensure the buckets exist
          STRUCTURE = ['technical/datasheets', 'technical/manuals', 'technical/certs']
          for f in STRUCTURE: Path(f).mkdir(parents=True, exist_ok=True)

          # 2. Simple Move (No Deletion)
          # This looks in the root and /technical for any loose PDFs
          for pdf in Path('.').rglob('*.pdf'):
              if 'technical/manuals' in str(pdf) or 'technical/certs' in str(pdf):
                  continue
              
              dest = Path('technical/manuals') / pdf.name
              if not dest.exists():
                  shutil.move(str(pdf), str(dest))
                  print(f'Moved: {pdf.name}')
          "
          python generate_schematic.py

      - name: Commit and Push
        run: |
          git config --global user.name "Slate-Bot"
          git config --global user.email "bot@slatevans.com"
          git add .
          git commit -m "Safe Repo Sync: Recovered and Organized PDFs" || echo "No changes"
          git push
