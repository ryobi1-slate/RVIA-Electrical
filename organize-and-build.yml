name: Slate Smart Repo Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  clean-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Smart Cleanup and Build
        run: |
          python -c "
          import os, shutil, hashlib
          from pathlib import Path

          # 1. Define Production Structure
          STRUCTURE = [
              'technical/engineering/archive_phase0',
              'technical/datasheets',
              'technical/manuals',
              'technical/certs'
          ]
          for f in STRUCTURE: Path(f).mkdir(parents=True, exist_ok=True)

          # 2. Smart Deduplication & Global Search
          def get_hash(path):
              hasher = hashlib.md5()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(4096), b''): hasher.update(chunk)
              return hasher.hexdigest()

          seen_hashes = {}
          # rglob('*.pdf') finds every PDF in every subfolder
          for pdf in Path('.').rglob('*.pdf'):
              # Skip files already in the correct destination to avoid loops
              if 'technical/manuals' in str(pdf) or 'technical/certs' in str(pdf):
                  h = get_hash(pdf)
                  seen_hashes[h] = pdf.name
                  continue

              h = get_hash(pdf)
              if h in seen_hashes:
                  print(f'Deleting duplicate: {pdf.name}')
                  pdf.unlink()
              else:
                  seen_hashes[h] = pdf.name
                  dest = Path('technical/manuals') / pdf.name
                  shutil.move(str(pdf), str(dest))
                  print(f'Organized: {pdf.name} -> technical/manuals/')
          "
          # 3. Generate the Phase 1 Schematic
          python generate_schematic.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Slate-Bot"
          git config --global user.email "bot@slatevans.com"
          git add .
          git commit -m "Fixed: Recursive Smart Cleanup and Phase 1 Build" || echo "No changes to commit"
          git push
