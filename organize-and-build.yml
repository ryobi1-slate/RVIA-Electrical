name: Organize Tech File and Build Schematic

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually from the 'Actions' tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Organization and Build
        run: |
          # 1. Run the cleanup/organization logic
          python organize_and_update.py
          
          # 2. Run the Phase 1 Schematic Generator
          python technical/engineering/generate_schematic.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Slate-Bot"
          git config --global user.email "bot@slatevans.com"
          git add .
          git commit -m "Automated repo organization and Phase 1 build" || echo "No changes to commit"
          git push
