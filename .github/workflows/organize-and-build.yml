name: Slate Repo Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    if: github.actor != 'github-actions[bot]' && github.actor != 'Slate-Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'

      - name: Run repo organizer
        run: |
          python organize_repo.py

      - name: Run schematic generator
        run: |
          python generate_schematic.py

      - name: Show generated files
        run: |
          echo "---- ROOT ----"
          ls -la
          echo "---- OUTPUT ----"
          ls -la output || echo "No output folder found"
          echo "---- TECHNICAL ----"
          find technical -maxdepth 3 -type f || echo "No technical files found"

      - name: Commit and Push
        run: |
          git config --global user.name "Slate-Bot"
          git config --global user.email "bot@slatevans.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Organized repo and regenerated schematic"
          git push
