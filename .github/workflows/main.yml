name: Slate Repo Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'

      - name: Organize and Generate
        run: |
          python -c "
          import os, shutil
          from pathlib import Path

          # 1. Setup the structure
          dirs = [
              'technical/engineering/archive_phase0',
              'technical/datasheets',
              'technical/manuals',
              'technical/certs'
          ]
          for d in dirs: Path(d).mkdir(parents=True, exist_ok=True)

          # 2. Simple Move from Root ONLY
          # This prevents the bot from digging into subfolders and getting confused
          for file in Path('.').iterdir():
              if file.is_file() and file.suffix.lower() == '.pdf':
                  dest = Path('technical/manuals') / file.name
                  print(f'Moving {file.name} to technical/manuals/')
                  shutil.move(str(file), str(dest))
          "
          # 3. Run the schematic generator
          python generate_schematic.py

      - name: Commit and Push
        run: |
          git config --global user.name "Slate-Bot"
          git config --global user.email "bot@slatevans.com"
          git add .
          git commit -m "Standardized folder structure and generated schematic" || echo "No changes to commit"
          git push
